<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Jugadas - La Polla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="antialiased">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
                &larr; Volver
            </a>
            <h1 class="text-xl font-bold text-white">Consulta Rápida</h1>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-8">
        
        <div id="login-section" class="glass rounded-2xl p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-center">Revisa tus Aciertos</h2>
            <form id="form-consulta" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Número de Teléfono</label>
                    <input type="tel" id="telefono" required placeholder="Ej: 5491123456789" class="w-full px-4 py-3 rounded-xl">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                    Buscar Jugadas 🔍
                </button>
            </form>
            <div id="error-msg" class="text-red-400 text-center mt-4 hidden"></div>
        </div>

        <div id="resultados-section" class="hidden mt-8">
            <div class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div>
                    <h3 class="text-lg font-bold text-indigo-300" id="res-nombre">Nombre</h3>
                    <p class="text-sm text-gray-400">Líneas gratis disp: <span id="res-gratis" class="font-bold text-white">0</span></p>
                </div>
            </div>

            <h3 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">Tus Líneas Activas (Sorteo Actual)</h3>
            <div id="lista-jugadas" class="space-y-4">
                <!-- JS Inject -->
            </div>
        </div>

    </main>

    <script>
        const formConsulta = document.getElementById('form-consulta');
        const loginSection = document.getElementById('login-section');
        const resultadosSection = document.getElementById('resultados-section');
        const errorMsg = document.getElementById('error-msg');
        
        formConsulta.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = formConsulta.querySelector('button');
            const telefono = document.getElementById('telefono').value;
            
            btn.disabled = true;
            btn.textContent = 'Buscando...';
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch(`/api/mis-jugadas?telefono=${encodeURIComponent(telefono)}`);
                if (res.ok) {
                    const data = await res.json();
                    renderResultados(data);
                    loginSection.classList.add('hidden');
                    resultadosSection.classList.remove('hidden');
                } else {
                    const err = await res.json();
                    errorMsg.textContent = err.error || 'No se encontró el jugador';
                    errorMsg.classList.remove('hidden');
                }
            } catch (e) {
                errorMsg.textContent = 'Error de red';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Buscar Jugadas 🔍';
            }
        });

        function renderResultados(data) {
            document.getElementById('res-nombre').textContent = data.jugador.nombre_completo;
            document.getElementById('res-gratis').textContent = data.jugador.lineas_gratis_disponibles;

            const lista = document.getElementById('lista-jugadas');
            lista.innerHTML = '';

            if (data.jugadas.length === 0) {
                lista.innerHTML = '<p class="text-gray-400 text-center py-4">No tienes líneas en el sorteo actual.</p>';
                return;
            }

            const numerosGanadores = new Set(data.numeros_salidos || []);

            data.jugadas.forEach((j, index) => {
                const elegidos = j.numeros_elegidos.split(',');
                
                const card = document.createElement('div');
                card.className = 'glass rounded-xl p-4 border ' + (j.pagada ? 'border-green-500/30' : 'border-red-500/30');
                
                const header = document.createElement('div');
                header.className = 'flex justify-between items-center mb-3 pb-2 border-b border-gray-700/50';
                header.innerHTML = `
                    <span class="font-bold text-gray-200">Línea #${j.id}</span>
                    <div class="flex gap-2">
                        ${j.es_linea_gratis ? '<span class="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded">Gratis</span>' : ''}
                        <span class="text-xs ${j.pagada ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'} px-2 py-1 rounded">
                            ${j.pagada ? 'PAGADA' : 'PENDIENTE PAGO'}
                        </span>
                    </div>
                `;
                
                const grid = document.createElement('div');
                grid.className = 'number-grid gap-2 mt-2';
                
                elegidos.forEach(n => {
                    const nDiv = document.createElement('div');
                    nDiv.className = 'text-center py-1 rounded text-sm font-bold border border-gray-700';
                    const isWinner = numerosGanadores.has(n.trim());
                    if (isWinner) {
                        nDiv.classList.add('bg-green-500', 'text-white', 'border-green-400');
                    } else {
                        nDiv.classList.add('bg-slate-800', 'text-gray-400');
                    }
                    nDiv.textContent = n.trim();
                    grid.appendChild(nDiv);
                });

                const footer = document.createElement('div');
                footer.className = 'mt-3 pt-2 text-right';
                footer.innerHTML = `<span class="text-lg font-bold text-indigo-400">${j.aciertos_actuales} / 10 Aciertos</span>`;

                card.appendChild(header);
                card.appendChild(grid);
                card.appendChild(footer);
                lista.appendChild(card);
            });
        }
    </script>
</body>
</html>
