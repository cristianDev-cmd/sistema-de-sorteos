<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Jugadas - La Polla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        body { font-size: 18px; }
        .num-ball {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 900;
            border: 2px solid #374151;
            background: #1e293b;
            color: #9ca3af;
            transition: all .2s;
        }
        .num-ball.ganador {
            background: #16a34a;
            color: #fff;
            border-color: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.5);
        }
    </style>
</head>

<body class="antialiased">

    <!-- Navbar grande y clara -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-3xl mx-auto px-3 sm:px-4 py-3 sm:py-4 flex flex-wrap justify-between items-center gap-2">
            <a href="/" class="flex items-center gap-2 text-indigo-400 font-extrabold text-lg sm:text-xl hover:text-white transition">
                ← Volver
            </a>
            <div class="flex gap-3 sm:gap-4 items-center">
                <button onclick="abrirModalFaqs()" class="text-xs sm:text-sm text-gray-400 hover:text-white transition font-medium">❓ FAQ</button>
                <h1 class="text-lg sm:text-2xl font-extrabold text-white">Mis Jugadas</h1>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-3 sm:px-4 py-6 sm:py-10">

        <!-- Formulario de búsqueda -->
        <div id="login-section" class="glass rounded-3xl p-8 shadow-2xl border border-gray-700">
            <div class="text-center mb-8">
                <div class="text-4xl sm:text-6xl mb-4">🔍</div>
                <h2 class="text-2xl sm:text-4xl font-black text-white mb-3">Revisá tus Aciertos</h2>
                <p class="text-gray-400 text-base sm:text-xl leading-relaxed">Ingresá tu número de teléfono para ver cuántos números acertaste esta semana</p>
            </div>

            <form id="form-consulta" class="space-y-6">
                <div>
                    <label class="block text-xl font-bold mb-3 text-gray-200">
                        📱 Número de Teléfono
                    </label>
                    <input type="tel" id="telefono" required
                        placeholder="Ej: 2613123456"
                        class="w-full px-4 sm:px-5 py-4 sm:py-5 text-xl sm:text-2xl rounded-2xl bg-gray-800 border-2 border-gray-600 text-white placeholder-gray-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-black py-4 sm:py-5 text-xl sm:text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-1">
                    Ver Mis Jugadas 🎰
                </button>
            </form>

            <div id="error-msg" class="text-red-400 text-center mt-6 text-xl font-bold hidden"></div>
        </div>

        <!-- Resultados -->
        <div id="resultados-section" class="hidden mt-8 space-y-6">

            <!-- Datos del jugador -->
            <div class="glass rounded-2xl p-6 border border-indigo-500/30 bg-indigo-500/5">
                <div class="flex justify-between items-center flex-wrap gap-4">
                    <div>
                        <p class="text-gray-400 text-base font-bold uppercase mb-1">Jugador</p>
                        <h3 class="text-3xl font-black text-indigo-300" id="res-nombre">—</h3>
                    </div>
                    <div class="text-center bg-gray-800/60 rounded-xl px-5 py-3">
                        <p class="text-gray-400 text-sm uppercase font-bold mb-1">Líneas Gratis</p>
                        <p class="text-4xl font-black text-green-400" id="res-gratis">0</p>
                    </div>
                </div>
            </div>

            <h3 class="text-2xl font-extrabold text-white border-b border-gray-700 pb-3">
                📋 Tus Líneas del Sorteo Actual
            </h3>

            <div id="lista-jugadas" class="space-y-6">
                <!-- JS Inject -->
            </div>

            <!-- Botón para nueva búsqueda -->
            <button onclick="location.reload()"
                class="w-full mt-4 bg-gray-700 hover:bg-gray-600 text-white font-bold py-4 text-xl rounded-2xl transition">
                ← Buscar otro número
            </button>
        </div>

    </main>

    <script>
        const formConsulta = document.getElementById('form-consulta');
        const loginSection = document.getElementById('login-section');
        const resultadosSection = document.getElementById('resultados-section');
        const errorMsg = document.getElementById('error-msg');

        formConsulta.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = formConsulta.querySelector('button');
            const telefono = document.getElementById('telefono').value;

            btn.disabled = true;
            btn.textContent = '⏳ Buscando...';
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch(`/api/mis-jugadas?telefono=${encodeURIComponent(telefono)}`);
                if (res.ok) {
                    const data = await res.json();
                    renderResultados(data);
                    loginSection.classList.add('hidden');
                    resultadosSection.classList.remove('hidden');
                } else {
                    const err = await res.json();
                    errorMsg.textContent = err.error || '❌ No se encontró ningún jugador con ese teléfono';
                    errorMsg.classList.remove('hidden');
                }
            } catch (e) {
                errorMsg.textContent = '❌ Error de red. Intentá de nuevo.';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Ver Mis Jugadas 🎰';
            }
        });

        function renderResultados(data) {
            document.getElementById('res-nombre').textContent = data.jugador.nombre_completo;
            document.getElementById('res-gratis').textContent = data.jugador.lineas_gratis_disponibles;

            const lista = document.getElementById('lista-jugadas');
            lista.innerHTML = '';

            if (data.jugadas.length === 0) {
                lista.innerHTML = `
                    <div class="glass rounded-2xl p-8 text-center border border-gray-700">
                        <div class="text-5xl mb-4">😔</div>
                        <p class="text-2xl text-gray-400">No tenés líneas en el sorteo actual.</p>
                    </div>`;
                return;
            }

            const numerosGanadores = new Set((data.numeros_salidos || []).map(n => String(n).trim()));

            data.jugadas.forEach((j) => {
                const elegidos = j.numeros_elegidos.split(',').map(n => n.trim());
                const aciertos = j.aciertos_actuales;

                let aciertosColor = 'text-gray-300';
                let aciertosEmoji = '';
                if (aciertos === 10)       { aciertosColor = 'text-yellow-400'; aciertosEmoji = '🏆'; }
                else if (aciertos === 9)   { aciertosColor = 'text-purple-400'; aciertosEmoji = '🔥'; }
                else if (aciertos >= 8)    { aciertosColor = 'text-blue-400';   aciertosEmoji = '✨'; }
                else if (aciertos === 0)   { aciertosColor = 'text-orange-400'; aciertosEmoji = '🥗'; }

                const borderColor = j.pagada ? 'border-green-500/40' : 'border-red-500/40';
                const card = document.createElement('div');
                card.className = `glass rounded-3xl p-6 border-2 ${borderColor} shadow-xl`;

                // Header
                const estadoHtml = j.pagada
                    ? `<span class="px-4 py-2 rounded-full bg-green-500/20 text-green-400 text-base font-bold border border-green-500/40">✅ PAGADA</span>`
                    : `<span class="px-4 py-2 rounded-full bg-red-500/20 text-red-400 text-base font-bold border border-red-500/40">⏳ PENDIENTE DE PAGO</span>`;

                const gratisHtml = j.es_linea_gratis
                    ? `<span class="px-3 py-1 rounded-full bg-indigo-500/20 text-indigo-300 text-sm font-bold">🎁 Gratis</span>`
                    : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start flex-wrap gap-3 mb-5 pb-4 border-b border-gray-700/60">
                        <div class="flex flex-col gap-2">
                            <span class="text-gray-400 text-base font-bold uppercase">Línea #${j.id}</span>
                            ${gratisHtml}
                        </div>
                        ${estadoHtml}
                    </div>

                    <!-- Números como bolitas grandes -->
                    <div class="flex flex-wrap gap-3 justify-center mb-5">
                        ${elegidos.map(n => {
                            const isWinner = numerosGanadores.has(n);
                            return `<div class="num-ball ${isWinner ? 'ganador' : ''}">${n}</div>`;
                        }).join('')}
                    </div>

                    <!-- Resultado de aciertos -->
                    <div class="text-center bg-gray-800/60 rounded-2xl py-4 px-6">
                        <p class="text-gray-400 text-base uppercase font-bold mb-1">Tus aciertos</p>
                        <p class="text-5xl font-black ${aciertosColor}">${aciertosEmoji} ${aciertos} <span class="text-2xl text-gray-500">/ 10</span></p>
                        ${numerosGanadores.size > 0 ? '<p class="text-sm text-gray-500 mt-2">Los números en verde son los que salieron</p>' : '<p class="text-sm text-gray-500 mt-2">Aún no se sortearon los números</p>'}
                    </div>
                `;

                lista.appendChild(card);
            });
        }
    </script>
</body>

</html>
